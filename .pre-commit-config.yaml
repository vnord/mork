default_stages: [pre-commit, pre-push]

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: trailing-whitespace
        exclude: ^(Cargo\.lock|assets/)
      - id: end-of-file-fixer
        exclude: ^(Cargo\.lock|assets/)
      - id: check-yaml
      - id: check-added-large-files
        args: ["--maxkb=1024"]
      - id: check-merge-conflict
      - id: detect-private-key

  - repo: local
    hooks:
      - id: cargo-fmt
        name: cargo fmt
        entry: cargo fmt --all --
        language: system
        types: [rust]
        pass_filenames: false

      - id: cargo-clippy
        name: cargo clippy
        entry: cargo clippy --all-targets --all-features -- -D warnings
        language: system
        types: [rust]
        pass_filenames: false

      - id: prettier
        name: prettier
        entry: prettier --write
        language: system
        types_or: [markdown, yaml, json, css, html, javascript]
        exclude: ^(Cargo\.lock|assets/)

      - id: taplo-fmt
        name: taplo fmt
        entry: taplo fmt
        language: system
        types: [toml]

      - id: gitleaks
        name: gitleaks
        entry: gitleaks detect --verbose --redact
        language: system
        pass_filenames: false
