name: prek

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Linux build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y pkg-config libwayland-dev libxkbcommon-dev libudev-dev libasound2-dev

      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: stable
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@v2

      - name: Install prek
        run:
          curl --proto '=https' --tlsv1.2 -LsSf
          https://github.com/j178/prek/releases/download/v0.3.13/prek-installer.sh | sh

      - uses: taiki-e/install-action@v2
        with:
          tool: taplo-cli

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install prettier
        run: npm install -g prettier@3

      - name: Add prek to PATH
        run: echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: prek run --all-files
        env:
          SKIP: gitleaks
        run: prek run --all-files
