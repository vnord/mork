name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: stable
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@v2

      - name: Install prek
        run:
          curl --proto '=https' --tlsv1.2 -LsSf
          https://github.com/j178/prek/releases/download/v0.3.13/prek-installer.sh | sh

      - uses: taiki-e/install-action@v2
        with:
          tool: taplo-cli

      - name: Install gitleaks
        run: |
          set -euo pipefail
          mkdir -p "$HOME/.local/bin"
          version=8.24.0
          curl -sSL "https://github.com/gitleaks/gitleaks/releases/download/v${version}/gitleaks_${version}_linux_x64.tar.gz" | tar -xz -C "$HOME/.local/bin" gitleaks

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install prettier
        run: npm install -g prettier@3

      - name: Add prek to PATH
        run: echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: prek run --all-files
        run: prek run --all-files

      - name: cargo test --lib
        run: cargo test --lib
